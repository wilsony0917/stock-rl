<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilson 猜股票</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toolbar">
    <button id="searchBtn" type="button">🔍 查詢</button>
    <input id="stockInput" type="text" placeholder="輸入字串 / Regex" autocomplete="off" />
    <!-- <button id="clearBtn" type="button">清除</button> -->
  </div>

  <main id="content">
    <section id="leftPanel">
      <h2>Wilson 猜股票</h2>
      <p class="meta">更新時間：<span id="updateTime">讀取中...</span></p>
      <div id="status">正在讀取 daily.json...</div>
      <div id="result">請輸入字串後查詢</div>
    </section>

    <section id="rightPanel">
      <iframe id="tvFrame" title="TradingView Chart" frameborder="0"></iframe>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
